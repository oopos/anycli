name: bilibili
description: "Bilibili — hot videos, search, and rankings"
base_url: "https://api.bilibili.com"
version: "1.0.0"

commands:
  hot:
    description: "Popular/trending videos"
    url: "/x/web-interface/popular?ps={limit}&pn=1"
    format: json
    selector: "data.list"
    fields:
      title:
        json_path: "title"
      bvid:
        json_path: "bvid"
      author:
        json_path: "owner.name"
      view:
        json_path: "stat.view"
      danmaku:
        json_path: "stat.danmaku"
      reply:
        json_path: "stat.reply"
      desc:
        json_path: "desc"
        default: ""
    params:
      limit:
        type: integer
        default: 20
        description: "Number of videos per page"

  search:
    description: "Search videos"
    url: "/x/web-interface/wbi/search/all/v2?keyword={query}&page=1&page_size={limit}"
    format: json
    selector: "data.result"
    fields:
      title:
        json_path: "title"
        transform: strip_html
      bvid:
        json_path: "bvid"
      author:
        json_path: "author"
      play:
        json_path: "play"
      description:
        json_path: "description"
        default: ""
    params:
      query:
        type: string
        required: true
        description: "Search keyword"
      limit:
        type: integer
        default: 20
        description: "Results per page"
    headers:
      Referer: "https://www.bilibili.com"

  ranking:
    description: "Ranking by category"
    url: "/x/web-interface/ranking/v2?rid={rid}&type=all"
    format: json
    selector: "data.list"
    fields:
      title:
        json_path: "title"
      bvid:
        json_path: "bvid"
      author:
        json_path: "owner.name"
      score:
        json_path: "score"
      view:
        json_path: "stat.view"
    params:
      rid:
        type: integer
        default: 0
        description: "Category ID (0=all, 1=anime, 3=music, 4=game, 5=dance, 36=tech, 188=digital)"

  history:
    description: "我的观看历史 (needs login)"
    url: "https://www.bilibili.com"
    format: browser_api
    evaluate: |
      fetch('https://api.bilibili.com/x/web-interface/history/cursor?ps=20&type=archive',{credentials:'include'}).then(r=>r.json()).then(d=>JSON.stringify((d.data?.list||[]).map(i=>({title:i.title,author:i.author_name,bvid:i.history?.bvid||'',progress:i.progress,duration:i.duration}))))
    fields:
      title:
        json_path: "title"
      author:
        json_path: "author"
      bvid:
        json_path: "bvid"
      progress:
        json_path: "progress"
      duration:
        json_path: "duration"
    params:
      limit:
        type: integer
        default: 20
        description: "Number of items to return"

  me:
    description: "My Bilibili profile info (needs login)"
    url: "https://www.bilibili.com"
    format: browser_api
    evaluate: |
      fetch('https://api.bilibili.com/x/web-interface/nav',{credentials:'include'}).then(r=>r.json()).then(d=>JSON.stringify({uname:d.data?.uname,mid:d.data?.mid,money:d.data?.money,level:d.data?.level_info?.current_level}))
    fields:
      uname:
        json_path: "uname"
      mid:
        json_path: "mid"
      money:
        json_path: "money"
      level:
        json_path: "level"
    params: {}

  feed:
    description: "动态时间线 (needs login)"
    url: "https://www.bilibili.com"
    format: browser_api
    evaluate: |
      fetch('https://api.bilibili.com/x/polymer/web-dynamic/v1/feed/all?type=video&page=1',{credentials:'include'}).then(r=>r.json()).then(d=>JSON.stringify((d.data?.items||[]).map(i=>({author:i.modules?.module_author?.name,title:i.modules?.module_dynamic?.major?.archive?.title||'',bvid:i.modules?.module_dynamic?.major?.archive?.bvid||''}))))
    fields:
      author:
        json_path: "author"
      title:
        json_path: "title"
      bvid:
        json_path: "bvid"
    params:
      limit:
        type: integer
        default: 20
        description: "Number of items to return"
