name: ebay
description: "eBay — Search products, view item details, and browse listings"
base_url: "https://www.ebay.com"
version: "1.0.0"

commands:
  search:
    description: "Search eBay product listings"
    url: "https://www.ebay.com/sch/i.html?_nkw={query}"
    format: browser_api
    evaluate: |
      (async () => {
        await new Promise(r => setTimeout(r, 5000));
        window.scrollBy(0, 2000);
        await new Promise(r => setTimeout(r, 2000));
        const items = Array.from(document.querySelectorAll('.s-item'));
        const results = [];
        for (const el of items) {
          const title = (el.querySelector('.s-item__title')?.textContent || '').replace(/\s+/g, ' ').trim();
          const price = (el.querySelector('.s-item__price')?.textContent || '').trim();
          const url = el.querySelector('.s-item__link')?.href || '';
          const shipping = (el.querySelector('.s-item__shipping, .s-item__freeXDays')?.textContent || '').trim();
          const seller = (el.querySelector('.s-item__seller-info-text, .s-item__itemLocation')?.textContent || '').trim();
          const condition = (el.querySelector('.SECONDARY_INFO')?.textContent || '').trim();
          const bids = (el.querySelector('.s-item__bidCount')?.textContent || '').trim();
          if (!title || title === 'Shop on eBay') continue;
          results.push({
            title: title.slice(0, 150),
            price,
            shipping: shipping || 'N/A',
            seller: seller || 'N/A',
            condition: condition || 'N/A',
            bids: bids || '',
            url
          });
          if (results.length >= 20) break;
        }
        return JSON.stringify(results);
      })()
    fields:
      title:
        json_path: "title"
      price:
        json_path: "price"
      shipping:
        json_path: "shipping"
        default: ""
      seller:
        json_path: "seller"
        default: ""
      condition:
        json_path: "condition"
        default: ""
      bids:
        json_path: "bids"
        default: ""
      url:
        json_path: "url"
    params:
      query:
        type: string
        required: true
        description: "Search keyword"
      limit:
        type: integer
        default: 20
        description: "Number of results"

  item:
    description: "eBay item detail page"
    url: "https://www.ebay.com/itm/{item_id}"
    format: browser_api
    evaluate: |
      (async () => {
        await new Promise(r => setTimeout(r, 4000));
        const title = (document.querySelector('.x-item-title__mainTitle')?.textContent || '').replace(/\s+/g, ' ').trim();
        const price = (document.querySelector('.x-price-primary')?.textContent || '').trim();
        const condition = (document.querySelector('.x-item-condition-text')?.textContent || '').trim();
        const seller = (document.querySelector('.x-sellercard-atf__info__about-seller a')?.textContent || '').trim();
        const sellerRating = (document.querySelector('.x-sellercard-atf__data-item--positive')?.textContent || '').trim();
        const shippingCost = (document.querySelector('.ux-labels-values--shipping .ux-textspans--BOLD')?.textContent || '').trim();
        const location = (document.querySelector('.ux-labels-values--itemLocation .ux-textspans--SECONDARY')?.textContent || '').trim();
        const watchers = (document.querySelector('.d-watches-count')?.textContent || '').trim();
        const description = (document.querySelector('#viTabs_0_is')?.textContent || '').replace(/\s+/g, ' ').trim().slice(0, 500);
        return JSON.stringify({
          title,
          price,
          condition,
          seller,
          seller_rating: sellerRating,
          shipping: shippingCost || 'See listing',
          location,
          watchers,
          description
        });
      })()
    fields:
      title:
        json_path: "title"
      price:
        json_path: "price"
      condition:
        json_path: "condition"
        default: ""
      seller:
        json_path: "seller"
        default: ""
      seller_rating:
        json_path: "seller_rating"
        default: ""
      shipping:
        json_path: "shipping"
        default: ""
      location:
        json_path: "location"
        default: ""
      watchers:
        json_path: "watchers"
        default: ""
      description:
        json_path: "description"
        default: ""
    params:
      item_id:
        type: string
        required: true
        description: "eBay item ID number"
