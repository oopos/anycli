name: google
description: "Google — search, news, suggestions, and trends"
base_url: "https://www.google.com"
version: "1.0.0"

commands:
  suggest:
    description: "Get Google search suggestions"
    url: "https://suggestqueries.google.com/complete/search?client=firefox&q={query}"
    format: json
    fields:
      suggestions:
        json_path: "[1]"
    params:
      query:
        type: string
        required: true
        description: "Search query"

  news:
    description: "Get Google News headlines (RSS)"
    url: "https://news.google.com/rss?hl={lang}&gl={country}&ceid={country}:{lang}"
    format: xml
    selector: "<item>.*?</item>"
    fields:
      title:
        pattern: "<title>(.+?)</title>"
      url:
        pattern: "<link>(.+?)</link>"
      published:
        pattern: "<pubDate>(.+?)</pubDate>"
        default: ""
      source:
        pattern: "<source[^>]*>(.+?)</source>"
        default: ""
    params:
      lang:
        type: string
        default: "zh-CN"
        description: "Language (en, zh-CN, ja, etc)"
      country:
        type: string
        default: "CN"
        description: "Country code (US, CN, JP, etc)"
      limit:
        type: integer
        default: 20
        description: "Number of articles to return"

  trends:
    description: "Google Trends daily trending searches (RSS)"
    url: "https://trends.google.com/trends/trendingsearches/daily/rss?geo={geo}"
    format: xml
    selector: "<item>.*?</item>"
    fields:
      title:
        pattern: "<title>(.+?)</title>"
      traffic:
        pattern: "<ht:approx_traffic>(.+?)</ht:approx_traffic>"
        default: ""
      news_title:
        pattern: "<ht:news_item_title>(.+?)</ht:news_item_title>"
        default: ""
    params:
      geo:
        type: string
        default: "US"
        description: "Country code (US, CN, JP, etc)"
      limit:
        type: integer
        default: 20
        description: "Number of trends to return"
