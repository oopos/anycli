name: substack
description: "Substack — search posts, browse feeds, and read newsletter archives"
base_url: "https://substack.com"
version: "1.0.0"

commands:
  search:
    description: "Search Substack posts by keyword"
    url: "https://substack.com/api/v1/post/search?query={keyword}&page=0&includePlatformResults=true"
    format: json
    selector: "results"
    fields:
      title:
        json_path: "title"
      author:
        json_path: "publishedBylines[0].name"
        default: ""
      date:
        json_path: "post_date"
        default: ""
      description:
        json_path: "description"
        default: ""
      url:
        json_path: "canonical_url"
        default: ""
    params:
      keyword:
        type: string
        required: true
        description: "Search keyword"
      limit:
        type: integer
        default: 20
        description: "Number of results to return (max 50)"

  search_publications:
    description: "Search Substack newsletters/publications"
    url: "https://substack.com/api/v1/profile/search?query={keyword}&page=0"
    format: json
    selector: "results"
    fields:
      name:
        json_path: "name"
        default: ""
      bio:
        json_path: "bio"
        default: ""
      publication_name:
        json_path: "primaryPublication.name"
        default: ""
      publication_url:
        json_path: "primaryPublication.custom_domain"
        default: ""
      subdomain:
        json_path: "primaryPublication.subdomain"
        default: ""
    params:
      keyword:
        type: string
        required: true
        description: "Search keyword"
      limit:
        type: integer
        default: 20
        description: "Number of results to return (max 50)"

  feed:
    description: "Browse Substack trending/popular posts feed (requires login cookie)"
    url: "https://substack.com/"
    format: browser_api
    evaluate: |
      (async () => {
        await new Promise((resolve) => setTimeout(resolve, 3000));
        const normalize = (value) => (value || '').replace(/\s+/g, ' ').trim();
        const posts = [];
        const seen = new Set();
        const limit = 50;

        const allLinks = Array.from(document.querySelectorAll('a')).filter((link) => {
          const href = link.getAttribute('href') || '';
          return href.includes('/home/post/') || href.includes('/p/');
        });

        for (const linkEl of allLinks) {
          let postUrl = linkEl.getAttribute('href') || '';
          if (!postUrl) continue;
          if (!postUrl.startsWith('http')) postUrl = 'https://substack.com' + postUrl;
          if (seen.has(postUrl)) continue;

          const lines = (linkEl.innerText || '')
            .split('\n')
            .map((line) => normalize(line))
            .filter(Boolean);

          const readMeta = lines.find((line) => /\b(read|watch|listen)\b/i.test(line)) || '';
          if (!readMeta) continue;

          const date = lines.find((line) => /^[A-Z]{3}\s+\d{1,2}$/i.test(line)) || '';
          const contentLines = lines.filter((line) =>
            line &&
            line !== date &&
            line !== readMeta &&
            line.toLowerCase() !== 'save' &&
            line.toLowerCase() !== 'more' &&
            !/^(sign in|create account|get app)$/i.test(line),
          );

          const metaParts = readMeta.split('\u2219').map((part) => normalize(part));
          const author = metaParts[0] || '';
          const readTime = metaParts.slice(1).join(' \u2219 ') || readMeta;
          const title = contentLines.length >= 2 ? contentLines[1] : (contentLines[0] || '');
          if (!title) continue;

          seen.add(postUrl);
          posts.push({
            rank: posts.length + 1,
            title,
            author,
            date,
            readTime,
            url: postUrl,
          });

          if (posts.length >= limit) break;
        }

        return JSON.stringify(posts);
      })()
    fields:
      rank:
        json_path: "rank"
      title:
        json_path: "title"
      author:
        json_path: "author"
        default: ""
      date:
        json_path: "date"
        default: ""
      readTime:
        json_path: "readTime"
        default: ""
      url:
        json_path: "url"
    params:
      category:
        type: string
        default: "all"
        description: "Category: all, tech, business, culture, politics, science, health"
      limit:
        type: integer
        default: 20
        description: "Number of posts to return (max 50)"

  publication:
    description: "Get recent articles from a specific Substack newsletter (requires login cookie)"
    url: "{url}/archive"
    format: browser_api
    evaluate: |
      (async () => {
        await new Promise((resolve) => setTimeout(resolve, 3000));
        const normalize = (value) => (value || '').replace(/\s+/g, ' ').trim();
        const limit = 50;
        const grouped = new Map();
        const baseUrl = window.location.origin;

        for (const link of Array.from(document.querySelectorAll('a[href*="/p/"]'))) {
          const rawHref = link.getAttribute('href') || '';
          if (!rawHref || rawHref === '/p/upgrade') continue;

          const url = rawHref.startsWith('http') ? rawHref : baseUrl + rawHref;
          const text = normalize(link.textContent);
          if (!text) continue;
          if (/^(subscribe|paid|home|about|latest|top|discussions)$/i.test(text)) continue;
          if (/^[\d,]+$/.test(text)) continue;

          const entry = grouped.get(url) || { texts: new Set(), date: '' };
          entry.texts.add(text);

          const container = link.closest('article, section, div') || link.parentElement || link;
          const containerText = normalize(container.textContent);
          if (!entry.date) {
            entry.date = containerText.match(/\b(?:[A-Z]{3}\s+\d{1,2}|[A-Z][a-z]{2}\s+\d{1,2})\b/)?.[0] || '';
          }

          grouped.set(url, entry);
        }

        const posts = [];
        for (const [url, entry] of Array.from(grouped.entries())) {
          const texts = Array.from(entry.texts).map((text) => normalize(text)).filter((text) => text.length > 3).sort((a, b) => a.length - b.length);
          const title = texts[0] || '';
          const description = texts.find((text) => text !== title) || '';
          if (!title) continue;
          posts.push({
            rank: posts.length + 1,
            title,
            date: entry.date,
            description: description.slice(0, 150),
            url,
          });
          if (posts.length >= limit) break;
        }

        return JSON.stringify(posts);
      })()
    fields:
      rank:
        json_path: "rank"
      title:
        json_path: "title"
      date:
        json_path: "date"
        default: ""
      description:
        json_path: "description"
        default: ""
      url:
        json_path: "url"
    params:
      url:
        type: string
        required: true
        description: "Newsletter URL (e.g. https://example.substack.com)"
      limit:
        type: integer
        default: 20
        description: "Number of articles to return (max 50)"
