name: maimai
description: "脉脉 — 职场社交人才搜索"
base_url: "https://maimai.cn"
version: "1.0.0"

commands:
  search_talents:
    description: "搜索候选人（需要企业版登录cookie）"
    url: "https://maimai.cn/ent/talents/discover/search_v2"
    format: browser_api
    evaluate: |
      (async () => {
        const query = '{query}';
        const pageNum = {page};
        const size = {size};

        await new Promise(r => setTimeout(r, 5000));

        const sessionid = 'b92d0fb5-f3fd-1f4b-fcdc-' + Math.random().toString(16).slice(2, 14);
        const deletesessionid = 'ae907d75-315c-8db7-2cc7-' + Math.random().toString(16).slice(2, 14);

        const requestBody = {
          search: {
            page: pageNum,
            size: size,
            sessionid: sessionid,
            deletesessionid: deletesessionid,
            worktimes: '',
            degrees: '',
            professions: '',
            schools: '',
            positions: '',
            companyscope: 0,
            sortby: 0,
            is_direct_chat: 0,
            query: query,
            cities: '',
            provinces: '',
            is_211: 0,
            is_985: 0,
            allcompanies: '',
          },
        };

        let csrftoken = document.cookie.split('; ')
          .find(row => row.startsWith('csrftoken='))
          ?.split('=')[1] || '';
        if (!csrftoken) {
          const meta = document.querySelector('meta[name="csrf-token"]');
          if (meta) csrftoken = meta.getAttribute('content') || '';
        }

        const res = await fetch('https://maimai.cn/api/ent/discover/search?channel=www&data_version=3.0&version=1.0.0', {
          method: 'POST',
          headers: {
            'accept': '*/*',
            'content-type': 'text/plain;charset=UTF-8',
            'origin': 'https://maimai.cn',
            'referer': 'https://maimai.cn/ent/talents/discover/search_v2',
            'x-csrf-token': csrftoken,
          },
          credentials: 'include',
          body: JSON.stringify(requestBody),
        });

        const data = await res.json();
        const talentList = data.data?.list || data.data?.talent_list || data.list || [];

        if (!talentList || talentList.length === 0) {
          return JSON.stringify([{ error: '未找到匹配的候选人', query: query }]);
        }

        const results = talentList.map(item => {
          const schoolInfo = item.edu && item.edu.length > 0 ? item.edu[0] : {};
          const currentCompany = item.company || '';
          const historicalCompanies = (item.exp || [])
            .map(e => e.company)
            .filter(c => c && c.trim() !== '' && c !== currentCompany)
            .filter((c, i, arr) => arr.indexOf(c) === i)
            .join(' / ');
          const tags = (item.tag_list || item.tags || [])
            .filter(t => t && t.trim() !== '')
            .join(', ');

          return {
            name: item.name || '',
            job_title: item.position || item.job_title || '',
            company: currentCompany,
            historical_companies: historicalCompanies,
            location: (item.province || '') + (item.city ? '·' + item.city : ''),
            work_year: item.work_time || item.worktime || '',
            school: schoolInfo.school || '',
            degree: schoolInfo.sdegree || '',
            active_status: item.active_state_v2 || item.active_state_v1 || '',
            age: item.age || '',
            tags: tags,
          };
        });
        return JSON.stringify(results);
      })()
    fields:
      name:
        json_path: "name"
      job_title:
        json_path: "job_title"
      company:
        json_path: "company"
      historical_companies:
        json_path: "historical_companies"
      location:
        json_path: "location"
      work_year:
        json_path: "work_year"
      school:
        json_path: "school"
      degree:
        json_path: "degree"
      active_status:
        json_path: "active_status"
      tags:
        json_path: "tags"
    params:
      query:
        type: string
        required: true
        description: "Search keyword (e.g. Java, 产品经理)"
      page:
        type: integer
        default: 0
        description: "Page number (0-based)"
      size:
        type: integer
        default: 20
        description: "Results per page"
