name: xianyu
description: "闲鱼 — 二手商品搜索、商品详情（需要登录）"
base_url: "https://www.goofish.com"
version: "1.0.0"

commands:
  search:
    description: "搜索闲鱼商品"
    url: "https://www.goofish.com/search?q={query}"
    format: browser_api
    evaluate: |
      (async () => {
        const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
        const waitFor = async (predicate, timeoutMs = 8000) => {
          const start = Date.now();
          while (Date.now() - start < timeoutMs) {
            if (predicate()) return true;
            await wait(150);
          }
          return false;
        };
        const clean = (value) => (value || '').replace(/\s+/g, ' ').trim();
        const selectors = {
          card: 'a[href*="/item?id="]',
          title: '[class*="row1-wrap-title"], [class*="main-title"]',
          attrs: '[class*="row2-wrap-cpv"] span[class*="cpv--"]',
          priceWrap: '[class*="price-wrap"]',
          priceNum: '[class*="number"]',
          priceDec: '[class*="decimal"]',
          sellerWrap: '[class*="row4-wrap-seller"]',
          sellerText: '[class*="seller-text"]',
          badge: '[class*="credit-container"] [title], [class*="credit-container"] span',
        };
        await waitFor(() => {
          return Boolean(document.querySelector(selectors.card));
        });
        const limit = 20;
        const items = Array.from(document.querySelectorAll(selectors.card))
          .slice(0, limit)
          .map((card) => {
            const href = card.href || card.getAttribute('href') || '';
            const title = clean(card.querySelector(selectors.title)?.textContent || '');
            const attrs = Array.from(card.querySelectorAll(selectors.attrs))
              .map((node) => clean(node.textContent || ''))
              .filter(Boolean);
            const priceWrap = card.querySelector(selectors.priceWrap);
            const priceNumber = clean(priceWrap?.querySelector(selectors.priceNum)?.textContent || '');
            const priceDecimal = clean(priceWrap?.querySelector(selectors.priceDec)?.textContent || '');
            const location = clean(card.querySelector(selectors.sellerWrap)?.querySelector(selectors.sellerText)?.textContent || '');
            const badgeNode = card.querySelector(selectors.badge);
            const idMatch = href.match(/[?&]id=(\d+)/);
            return {
              item_id: idMatch ? idMatch[1] : '',
              title,
              price: clean('¥' + priceNumber + priceDecimal).replace(/^¥\s*$/, ''),
              condition: attrs[0] || '',
              brand: attrs[1] || '',
              location,
              badge: clean(badgeNode?.getAttribute('title') || badgeNode?.textContent || ''),
              url: href,
            };
          })
          .filter((item) => item.title && item.url);
        return JSON.stringify(items);
      })()
    fields:
      item_id:
        json_path: "item_id"
      title:
        json_path: "title"
      price:
        json_path: "price"
      condition:
        json_path: "condition"
        default: ""
      brand:
        json_path: "brand"
        default: ""
      location:
        json_path: "location"
        default: ""
      badge:
        json_path: "badge"
        default: ""
      url:
        json_path: "url"
    params:
      query:
        type: string
        required: true
        description: "搜索关键词"
      limit:
        type: integer
        default: 20
        description: "返回结果数量"

  item:
    description: "查看闲鱼商品详情"
    url: "https://www.goofish.com/item?id={item_id}"
    format: browser_api
    evaluate: |
      (async () => {
        const clean = (value) => String(value ?? '').replace(/\s+/g, ' ').trim();
        const waitFor = async (predicate, timeoutMs = 5000) => {
          const start = Date.now();
          while (Date.now() - start < timeoutMs) {
            if (predicate()) return true;
            await new Promise((r) => setTimeout(r, 150));
          }
          return false;
        };
        await waitFor(() => window.lib?.mtop?.request);
        if (!window.lib || !window.lib.mtop || typeof window.lib.mtop.request !== 'function') {
          return JSON.stringify([{error: 'mtop-not-ready'}]);
        }
        let response;
        try {
          response = await window.lib.mtop.request({
            api: 'mtop.taobao.idle.pc.detail',
            data: { itemId: document.location.search.match(/id=(\d+)/)?.[1] || '' },
            type: 'POST',
            v: '1.0',
            dataType: 'json',
            needLogin: false,
            needLoginPC: false,
            sessionOption: 'AutoLoginOnly',
            ecode: 0,
          });
        } catch (error) {
          return JSON.stringify([{error: 'request-failed', message: String(error?.message || error)}]);
        }
        const data = response?.data || {};
        const item = data.itemDO || {};
        const seller = data.sellerDO || {};
        const labels = Array.isArray(item.itemLabelExtList) ? item.itemLabelExtList : [];
        const findLabel = (name) => labels.find((l) => clean(l.propertyText) === name)?.text || '';
        return JSON.stringify([{
          item_id: clean(item.itemId || ''),
          title: clean(item.title || ''),
          description: clean(item.desc || ''),
          price: clean('¥' + (item.soldPrice || item.defaultPrice || '')).replace(/^¥\s*$/, ''),
          original_price: clean(item.originalPrice || ''),
          want_count: String(item.wantCnt ?? ''),
          condition: clean(findLabel('成色')),
          brand: clean(findLabel('品牌')),
          location: clean(seller.publishCity || seller.city || ''),
          seller_name: clean(seller.nick || seller.uniqueName || ''),
          status: clean(item.itemStatusStr || ''),
        }]);
      })()
    fields:
      item_id:
        json_path: "item_id"
      title:
        json_path: "title"
      description:
        json_path: "description"
        default: ""
      price:
        json_path: "price"
      original_price:
        json_path: "original_price"
        default: ""
      want_count:
        json_path: "want_count"
        default: ""
      condition:
        json_path: "condition"
        default: ""
      brand:
        json_path: "brand"
        default: ""
      location:
        json_path: "location"
        default: ""
      seller_name:
        json_path: "seller_name"
        default: ""
      status:
        json_path: "status"
        default: ""
    params:
      item_id:
        type: string
        required: true
        description: "闲鱼商品ID"
