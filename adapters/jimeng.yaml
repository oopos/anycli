name: jimeng
description: "即梦AI — 文生图生成和历史记录（需登录）"
base_url: "https://jimeng.jianying.com"
version: "1.0.0"

commands:
  generate:
    description: "输入 prompt 生成图片"
    url: "https://jimeng.jianying.com/ai-tool/generate?type=image&workspace=0"
    format: browser_api
    evaluate: |
      (async () => {
        const prompt = '{prompt}';
        const waitSec = 40;

        // Count existing images before generation
        const beforeImgs = document.querySelectorAll('img[src*="dreamina-sign"], img[src*="tb4s082cfz"]').length;

        // Clear and set prompt
        const editors = document.querySelectorAll('[contenteditable="true"]');
        const editor = editors[0];
        if (!editor) return JSON.stringify([{ status: 'failed', prompt: prompt, image_count: 0, image_urls: 'Editor not found' }]);

        editor.focus();
        await new Promise(r => setTimeout(r, 200));
        document.execCommand('selectAll');
        await new Promise(r => setTimeout(r, 100));
        document.execCommand('delete');
        await new Promise(r => setTimeout(r, 200));
        document.execCommand('insertText', false, prompt);
        await new Promise(r => setTimeout(r, 500));

        // Click generate
        const btn = document.querySelector('.lv-btn.lv-btn-primary[class*="circle"]');
        if (!btn) return JSON.stringify([{ status: 'failed', prompt: prompt, image_count: 0, image_urls: 'Generate button not found' }]);
        btn.click();

        // Wait for new images
        let newImgs = [];
        for (let i = 0; i < waitSec; i++) {
          await new Promise(r => setTimeout(r, 1000));
          const allImgs = document.querySelectorAll('img[src*="dreamina-sign"], img[src*="tb4s082cfz"]');
          if (allImgs.length > beforeImgs) {
            newImgs = Array.from(allImgs).slice(0, allImgs.length - beforeImgs);
            break;
          }
        }

        if (newImgs.length === 0) {
          return JSON.stringify([{ status: 'timeout', prompt: prompt, image_count: 0, image_urls: 'Generation may still be in progress' }]);
        }

        const urls = newImgs.map(img => img.src);
        return JSON.stringify([{
          status: 'success',
          prompt: prompt.substring(0, 80),
          image_count: urls.length,
          image_urls: urls.join('\n')
        }]);
      })()
    fields:
      status:
        json_path: "status"
      prompt:
        json_path: "prompt"
      image_count:
        json_path: "image_count"
      image_urls:
        json_path: "image_urls"
    params:
      prompt:
        type: string
        required: true
        description: "图片描述 prompt"
      wait:
        type: integer
        default: 40
        description: "等待生成完成的秒数"

  history:
    description: "查看最近生成的作品"
    url: "https://jimeng.jianying.com/ai-tool/generate?type=image&workspace=0"
    format: browser_api
    evaluate: |
      (async () => {
        const limit = 5;
        const res = await fetch('/mweb/v1/get_history?aid=513695&device_platform=web&region=cn&da_version=3.3.11&web_version=7.5.0&aigc_features=app_lip_sync', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cursor: '', count: limit, need_page_item: true, need_aigc_data: true, aigc_mode_list: ['workbench'] })
        });
        const data = await res.json();
        const items = data?.data?.history_list || [];
        return JSON.stringify(items.slice(0, limit).map(item => {
          const params = item.aigc_image_params?.text2image_params || {};
          const images = item.image?.large_images || [];
          return {
            prompt: params.prompt || item.common_attr?.title || 'N/A',
            model: params.model_config?.model_name || 'unknown',
            status: item.common_attr?.status === 102 ? 'completed' : 'pending',
            image_url: images[0]?.image_url || '',
            created_at: new Date((item.common_attr?.create_time || 0) * 1000).toLocaleString('zh-CN'),
          };
        }));
      })()
    fields:
      prompt:
        json_path: "prompt"
      model:
        json_path: "model"
      status:
        json_path: "status"
      image_url:
        json_path: "image_url"
      created_at:
        json_path: "created_at"
    params:
      limit:
        type: integer
        default: 5
        description: "返回的作品数量"
