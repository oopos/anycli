name: hupu
description: "虎扑 — 体育社区热帖、搜索和帖子详情"
base_url: "https://bbs.hupu.com"
version: "1.0.0"

commands:
  hot:
    description: "虎扑热门帖子"
    url: "https://bbs.hupu.com/"
    format: browser_api
    evaluate: |
      (async () => {
        await new Promise(r => setTimeout(r, 3000));
        const html = document.documentElement.outerHTML;
        const posts = [];
        const regex = /<a[^>]*href="\/(\\d{9})\.html"[^>]*><span[^>]*class="t-title"[^>]*>([^<]+)<\/span><\/a>/g;
        let match;
        while ((match = regex.exec(html)) !== null && posts.length < 50) {
          posts.push({
            rank: posts.length + 1,
            title: match[2].trim(),
            url: 'https://bbs.hupu.com/' + match[1] + '.html',
          });
        }
        return JSON.stringify(posts);
      })()
    fields:
      rank:
        json_path: "rank"
      title:
        json_path: "title"
      url:
        json_path: "url"
    params:
      limit:
        type: integer
        default: 20
        description: "Number of hot posts to return"

  search:
    description: "搜索虎扑帖子"
    url: "https://bbs.hupu.com/search?q={query}&sortby={sort}&page={page}"
    format: browser_api
    evaluate: |
      (async () => {
        await new Promise(r => setTimeout(r, 3000));

        const extractFromScript = () => {
          const marker = 'window.$$data=';
          for (const script of Array.from(document.scripts)) {
            const text = script.textContent || '';
            const dataIndex = text.indexOf(marker);
            if (dataIndex === -1) continue;
            const jsonStart = dataIndex + marker.length;
            let braceCount = 0;
            let jsonEnd = jsonStart;
            let inString = false;
            let escapeNext = false;
            for (let i = jsonStart; i < text.length; i++) {
              const char = text[i];
              if (escapeNext) { escapeNext = false; continue; }
              if (char === '\\') { escapeNext = true; continue; }
              if (char === '"') { inString = !inString; continue; }
              if (!inString) {
                if (char === '{') braceCount++;
                else if (char === '}') {
                  braceCount--;
                  if (braceCount === 0) { jsonEnd = i; break; }
                }
              }
            }
            if (jsonEnd > jsonStart) return text.substring(jsonStart, jsonEnd + 1);
          }
          return '';
        };

        let data = null;
        if (typeof window.$$data !== 'undefined') {
          data = window.$$data;
        } else {
          const jsonString = extractFromScript();
          if (jsonString) data = JSON.parse(jsonString);
        }

        if (!data) return JSON.stringify([]);

        const items = (data.searchRes?.data || []);
        const results = items.map((item, index) => {
          const title = (item.title || '')
            .replace(/&nbsp;/g, ' ').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
            .replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&#x27;/g, "'")
            .replace(/<[^>]+>/g, '').trim();
          return {
            rank: index + 1,
            title: title,
            author: item.username || '',
            replies: item.replies || '0',
            lights: item.lights || '0',
            forum: item.forum_name || '',
            url: 'https://bbs.hupu.com/' + item.id + '.html',
          };
        });
        return JSON.stringify(results);
      })()
    fields:
      rank:
        json_path: "rank"
      title:
        json_path: "title"
      author:
        json_path: "author"
      replies:
        json_path: "replies"
        default: "0"
      lights:
        json_path: "lights"
        default: "0"
      forum:
        json_path: "forum"
        default: ""
      url:
        json_path: "url"
    params:
      query:
        type: string
        required: true
        description: "搜索关键词"
      page:
        type: integer
        default: 1
        description: "结果页码"
      sort:
        type: string
        default: "general"
        description: "排序方式: general/createtime/replytime/light/reply"
      limit:
        type: integer
        default: 20
        description: "Number of results to return"

  detail:
    description: "获取虎扑帖子详情"
    url: "https://bbs.hupu.com/{tid}.html"
    format: browser_api
    evaluate: |
      (async () => {
        const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
        const waitFor = async (predicate, limitMs = 5000) => {
          const start = Date.now();
          while (Date.now() - start < limitMs) {
            if (predicate()) return true;
            await wait(100);
          }
          return false;
        };

        const ready = await waitFor(() => {
          const script = document.getElementById('__NEXT_DATA__');
          return script?.textContent ? true : false;
        });

        if (!ready) return JSON.stringify([]);

        try {
          const text = document.getElementById('__NEXT_DATA__')?.textContent || '';
          const data = JSON.parse(text);
          const thread = data.props?.pageProps?.detail?.thread;
          if (!thread) return JSON.stringify([]);

          const stripHtml = (html) => {
            if (!html) return '';
            return html.replace(/\\u003c/g, '<').replace(/\\u003e/g, '>')
              .replace(/\\n/g, '\n').replace(/\\r/g, '')
              .replace(/<[^>]+>/g, '').trim();
          };

          const content = stripHtml(thread.content);
          const contentPreview = content.length > 300 ? content.substring(0, 300) + '...' : content;

          const lights = data.props?.pageProps?.detail?.lights || [];
          let repliesText = '';
          if (lights.length > 0) {
            const topReplies = lights.slice(0, 3);
            repliesText = topReplies.map((reply, i) => {
              const userName = reply.author?.puname || '';
              const replyContent = stripHtml(reply.content).substring(0, 100);
              const replyLights = reply.allLightCount || 0;
              return (i+1) + '. ' + userName + '(亮' + replyLights + '): ' + replyContent;
            }).join(' | ');
          }

          const result = [{
            title: thread.title || '',
            author: thread.author?.puname || '',
            content: contentPreview,
            replies: thread.replies || 0,
            lights: thread.lights || 0,
            top_replies: repliesText,
            url: location.href,
          }];
          return JSON.stringify(result);
        } catch (e) {
          return JSON.stringify([]);
        }
      })()
    fields:
      title:
        json_path: "title"
      author:
        json_path: "author"
      content:
        json_path: "content"
      replies:
        json_path: "replies"
        default: "0"
      lights:
        json_path: "lights"
        default: "0"
      top_replies:
        json_path: "top_replies"
        default: ""
      url:
        json_path: "url"
    params:
      tid:
        type: string
        required: true
        description: "帖子ID（9位数字）"
