name: devto
description: "DEV.to — developer community and blog platform"
base_url: "https://dev.to/api"
version: "1.0.0"

commands:
  top:
    description: "Top articles (past week)"
    url: "/articles?per_page={limit}&top=7"
    format: json
    fields:
      title:
        json_path: "title"
      user:
        json_path: "user.username"
      reactions:
        json_path: "positive_reactions_count"
      comments:
        json_path: "comments_count"
      tags:
        json_path: "tag_list"
      url:
        json_path: "url"
    params:
      limit:
        type: integer
        default: 20
        description: "Number of articles to return"

  tag:
    description: "Articles by tag"
    url: "/articles?per_page={limit}&tag={tag}&top=30"
    format: json
    fields:
      title:
        json_path: "title"
      user:
        json_path: "user.username"
      reactions:
        json_path: "positive_reactions_count"
      comments:
        json_path: "comments_count"
      url:
        json_path: "url"
    params:
      tag:
        type: string
        required: true
        description: "Tag name (e.g. rust, javascript, python, webdev)"
      limit:
        type: integer
        default: 20
        description: "Number of articles to return"

  user:
    description: "Articles by a specific user"
    url: "/articles?per_page={limit}&username={username}"
    format: json
    fields:
      title:
        json_path: "title"
      reactions:
        json_path: "positive_reactions_count"
      comments:
        json_path: "comments_count"
      published_at:
        json_path: "published_at"
      url:
        json_path: "url"
    params:
      username:
        type: string
        required: true
        description: "Username"
      limit:
        type: integer
        default: 20
        description: "Number of articles to return"
