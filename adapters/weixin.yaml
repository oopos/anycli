name: weixin
description: "微信公众号 — 文章下载提取（需要在浏览器中可访问文章）"
base_url: "https://mp.weixin.qq.com"
version: "1.0.0"

commands:
  download:
    description: "提取微信公众号文章内容（标题、作者、发布时间、正文）"
    url: "{url}"
    format: browser_api
    evaluate: |
      (async () => {
        await new Promise(r => setTimeout(r, 3000));

        // Check for verification gate
        var bodyText = document.body ? document.body.innerText.replace(/\s+/g, ' ').trim() : '';
        if (/环境异常/.test(bodyText) && /(完成验证后即可继续访问|去验证)/.test(bodyText)) {
          return JSON.stringify([{error: 'WeChat verification required. Please complete verification in browser first.'}]);
        }

        function pickFirstText() {
          for (var i = 0; i < arguments.length; i++) {
            var el = document.querySelector(arguments[i]);
            var text = el ? el.textContent.replace(/\s+/g, ' ').trim() : '';
            if (text && text !== 'Name cleared') return text;
          }
          return '';
        }

        var title = pickFirstText('#activity-name', '#js_text_title', '.rich_media_title');
        var author = pickFirstText('#js_name', '.wx_follow_nickname', '#profileBt .profile_nickname', '.rich_media_meta_nickname');

        // Extract publish time
        var publishTimeEl = document.querySelector('#publish_time');
        var publishTime = publishTimeEl ? publishTimeEl.textContent.trim() : '';
        if (!publishTime) {
          var html = document.documentElement.innerHTML;
          var match = html.match(/create_time\s*:\s*JsDecode\('([^']+)'\)/);
          if (!match) match = html.match(/create_time\s*[:=]\s*(?:"([^"]+)"|'([^']+)'|([0-9]+))/);
          if (match) {
            var rawTs = match[1] || match[2] || match[3] || '';
            if (/^\d{10}$|^\d{13}$/.test(rawTs)) {
              var ts = parseInt(rawTs);
              var timestampMs = rawTs.length === 13 ? ts : ts * 1000;
              var d = new Date(timestampMs + 8 * 3600 * 1000);
              var pad = function(n) { return String(n).padStart(2, '0'); };
              publishTime = d.getUTCFullYear() + '-' + pad(d.getUTCMonth()+1) + '-' + pad(d.getUTCDate()) + ' ' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes());
            }
          }
        }

        // Extract content
        var contentEl = document.querySelector('#js_content');
        var contentText = '';
        var imageCount = 0;

        if (contentEl) {
          // Fix lazy-loaded images
          contentEl.querySelectorAll('img').forEach(function(img) {
            var dataSrc = img.getAttribute('data-src');
            if (dataSrc) img.setAttribute('src', dataSrc);
          });

          imageCount = contentEl.querySelectorAll('img[src]').length;

          // Get text content, preserving some structure
          contentText = contentEl.innerText.replace(/\n{3,}/g, '\n\n').trim();
        }

        var wordCount = contentText.length;
        var results = [{
          title: title,
          author: author,
          publish_time: publishTime,
          word_count: String(wordCount),
          images: String(imageCount),
          content_preview: contentText.slice(0, 500) + (contentText.length > 500 ? '...' : '')
        }];

        return JSON.stringify(results);
      })()
    fields:
      title:
        json_path: "title"
      author:
        json_path: "author"
      publish_time:
        json_path: "publish_time"
      word_count:
        json_path: "word_count"
      images:
        json_path: "images"
      content_preview:
        json_path: "content_preview"
    params:
      url:
        type: string
        required: true
        description: "微信文章 URL (mp.weixin.qq.com/s/xxx)"
