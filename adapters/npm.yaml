name: npm
description: "NPM — search JavaScript/Node.js packages"
base_url: "https://registry.npmjs.org"
version: "1.0.0"

commands:
  search:
    description: "Search NPM packages"
    url: "/-/v1/search?text={query}&size={limit}"
    format: json
    selector: "objects"
    fields:
      name:
        json_path: "package.name"
      version:
        json_path: "package.version"
      description:
        json_path: "package.description"
        default: ""
      date:
        json_path: "package.date"
        default: ""
    params:
      query:
        type: string
        required: true
        description: "Search keyword"
      limit:
        type: integer
        default: 20
        description: "Number of results"
