name: bloomberg
description: "Bloomberg — financial news via RSS"
base_url: "https://feeds.bloomberg.com"
version: "1.0.0"

commands:
  main:
    description: "Bloomberg homepage top stories (RSS)"
    url: "/markets/news.rss"
    format: xml
    selector: "<item>.*?</item>"
    fields:
      title:
        pattern: "<title>(.+?)</title>"
      url:
        pattern: "<link>(.+?)</link>"
      published:
        pattern: "<pubDate>(.+?)</pubDate>"
        default: ""
    params:
      limit:
        type: integer
        default: 20
        description: "Number of articles to return"

