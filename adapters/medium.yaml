name: medium
description: "Medium — blog platform for developers and writers"
base_url: "https://medium.com"
version: "1.0.0"

commands:
  feed:
    description: "Latest articles by tag (via RSS)"
    url: "/feed/tag/{tag}"
    format: xml
    selector: "<item>.*?</item>"
    fields:
      title:
        pattern: "<title><!\\[CDATA\\[(.+?)\\]\\]></title>"
      author:
        pattern: "<dc:creator><!\\[CDATA\\[(.+?)\\]\\]></dc:creator>"
        default: ""
      url:
        pattern: "<link>(.+?)</link>"
      published:
        pattern: "<pubDate>(.+?)</pubDate>"
        default: ""
    params:
      tag:
        type: string
        required: true
        description: "Tag name (e.g. programming, javascript, ai, startup)"
      limit:
        type: integer
        default: 20
        description: "Number of articles to return"

  user:
    description: "Articles by a specific user (via RSS)"
    url: "/feed/@{username}"
    format: xml
    selector: "<item>.*?</item>"
    fields:
      title:
        pattern: "<title><!\\[CDATA\\[(.+?)\\]\\]></title>"
      url:
        pattern: "<link>(.+?)</link>"
      published:
        pattern: "<pubDate>(.+?)</pubDate>"
        default: ""
    params:
      username:
        type: string
        required: true
        description: "Medium username (without @)"
      limit:
        type: integer
        default: 20
        description: "Number of articles to return"

  search:
    description: "搜索 Medium 文章 (via RSS tag)"
    url: "/feed/tag/{query}"
    format: xml
    selector: "<item>.*?</item>"
    fields:
      title:
        pattern: "<title><!\\[CDATA\\[(.+?)\\]\\]></title>"
      author:
        pattern: "<dc:creator><!\\[CDATA\\[(.+?)\\]\\]></dc:creator>"
        default: ""
      url:
        pattern: "<link>(.+?)</link>"
      published:
        pattern: "<pubDate>(.+?)</pubDate>"
        default: ""
    params:
      query:
        type: string
        required: true
        description: "Search keyword (used as tag)"
      limit:
        type: integer
        default: 20
        description: "Number of articles to return"
