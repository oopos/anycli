name: crates
description: "crates.io — search Rust crates"
base_url: "https://crates.io/api/v1"
version: "1.0.0"

commands:
  search:
    description: "Search Rust crates"
    url: "/crates?q={query}&per_page={limit}"
    format: json
    selector: "crates"
    fields:
      name:
        json_path: "name"
      version:
        json_path: "max_version"
      description:
        json_path: "description"
        default: ""
      downloads:
        json_path: "downloads"
    params:
      query:
        type: string
        required: true
        description: "Search keyword"
      limit:
        type: integer
        default: 20
        description: "Number of results"
