name: twitter
description: "Twitter/X — timeline, trending, search, profiles (needs login)"
base_url: "https://x.com"
version: "1.0.0"

commands:
  timeline:
    description: "Fetch Twitter home timeline (for-you algorithmic feed)"
    url: "https://x.com/home"
    format: browser_api
    evaluate: |
      (async () => {
        const ct0 = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('ct0='))?.split('=')[1];
        if (!ct0) return JSON.stringify([{error: 'Not logged in'}]);

        const bearer = 'AAAAAAAAAAAAAAAAAAAAANRILgAAAAAAnNwIzUejRCOuH5E6I8xnZz4puTs%3D1Zv7ttfk8LF81IUq16cHjhLTvJu4FA33AGWWjCpTnA';
        const headers = {
          'Authorization': 'Bearer ' + decodeURIComponent(bearer),
          'X-Csrf-Token': ct0,
          'X-Twitter-Auth-Type': 'OAuth2Session',
          'X-Twitter-Active-User': 'yes'
        };

        const features = {
          rweb_video_screen_enabled: false,
          profile_label_improvements_pcf_label_in_post_enabled: true,
          rweb_tipjar_consumption_enabled: true,
          verified_phone_label_enabled: false,
          creator_subscriptions_tweet_preview_api_enabled: true,
          responsive_web_graphql_timeline_navigation_enabled: true,
          responsive_web_graphql_skip_user_profile_image_extensions_enabled: false,
          premium_content_api_read_enabled: false,
          communities_web_enable_tweet_community_results_fetch: true,
          c9s_tweet_anatomy_moderator_badge_enabled: true,
          responsive_web_grok_analyze_button_fetch_trends_enabled: false,
          responsive_web_grok_analyze_post_followups_enabled: true,
          responsive_web_jetfuel_frame: false,
          responsive_web_grok_share_attachment_enabled: true,
          articles_preview_enabled: true,
          responsive_web_edit_tweet_api_enabled: true,
          graphql_is_translatable_rweb_tweet_is_translatable_enabled: true,
          view_counts_everywhere_api_enabled: true,
          longform_notetweets_consumption_enabled: true,
          responsive_web_twitter_article_tweet_consumption_enabled: true,
          tweet_awards_web_tipping_enabled: false,
          responsive_web_grok_show_grok_translated_post: false,
          responsive_web_grok_analysis_button_from_backend: false,
          creator_subscriptions_quote_tweet_preview_enabled: false,
          freedom_of_speech_not_reach_fetch_enabled: true,
          standardized_nudges_misinfo: true,
          tweet_with_visibility_results_prefer_gql_limited_actions_policy_enabled: true,
          longform_notetweets_rich_text_read_enabled: true,
          longform_notetweets_inline_media_enabled: true,
          responsive_web_grok_image_annotation_enabled: true,
          responsive_web_enhance_cards_enabled: false
        };

        const variables = {
          count: 20,
          includePromotedContent: false,
          latestControlAvailable: true,
          requestContext: 'launch',
          withCommunity: true
        };

        const queryId = 'c-CzHF1LboFilMpsx4ZCrQ';
        const url = '/i/api/graphql/' + queryId + '/HomeTimeline'
          + '?variables=' + encodeURIComponent(JSON.stringify(variables))
          + '&features=' + encodeURIComponent(JSON.stringify(features));

        const resp = await fetch(url, { headers, credentials: 'include' });
        if (!resp.ok) return JSON.stringify([{error: 'HTTP ' + resp.status}]);
        const data = await resp.json();

        const results = [];
        const seen = new Set();
        const instructions = data?.data?.home?.home_timeline_urt?.instructions || [];
        for (const inst of instructions) {
          for (const entry of (inst.entries || [])) {
            const c = entry.content;
            const tweetResult = c?.itemContent?.tweet_results?.result;
            if (tweetResult) {
              if (c?.itemContent?.promotedMetadata) continue;
              const tw = tweetResult.tweet || tweetResult;
              const l = tw.legacy || {};
              if (!tw.rest_id || seen.has(tw.rest_id)) continue;
              seen.add(tw.rest_id);
              const u = tw.core?.user_results?.result;
              const screenName = u?.legacy?.screen_name || u?.core?.screen_name || 'unknown';
              const noteText = tw.note_tweet?.note_tweet_results?.result?.text;
              const views = tw.views?.count ? parseInt(tw.views.count, 10) : 0;
              results.push({
                id: tw.rest_id,
                author: screenName,
                text: noteText || l.full_text || '',
                likes: l.favorite_count || 0,
                retweets: l.retweet_count || 0,
                replies: l.reply_count || 0,
                views: views,
                created_at: l.created_at || '',
                url: 'https://x.com/' + screenName + '/status/' + tw.rest_id
              });
            }
            // Conversation module (grouped tweets)
            for (const item of (c?.items || [])) {
              const nested = item.item?.itemContent?.tweet_results?.result;
              if (nested) {
                if (item.item?.itemContent?.promotedMetadata) continue;
                const tw = nested.tweet || nested;
                const l = tw.legacy || {};
                if (!tw.rest_id || seen.has(tw.rest_id)) continue;
                seen.add(tw.rest_id);
                const u = tw.core?.user_results?.result;
                const screenName = u?.legacy?.screen_name || u?.core?.screen_name || 'unknown';
                const noteText = tw.note_tweet?.note_tweet_results?.result?.text;
                const views = tw.views?.count ? parseInt(tw.views.count, 10) : 0;
                results.push({
                  id: tw.rest_id,
                  author: screenName,
                  text: noteText || l.full_text || '',
                  likes: l.favorite_count || 0,
                  retweets: l.retweet_count || 0,
                  replies: l.reply_count || 0,
                  views: views,
                  created_at: l.created_at || '',
                  url: 'https://x.com/' + screenName + '/status/' + tw.rest_id
                });
              }
            }
          }
        }
        return JSON.stringify(results.slice(0, 20));
      })()
    fields:
      id:
        json_path: "id"
      author:
        json_path: "author"
      text:
        json_path: "text"
      likes:
        json_path: "likes"
      retweets:
        json_path: "retweets"
      replies:
        json_path: "replies"
      views:
        json_path: "views"
      created_at:
        json_path: "created_at"
      url:
        json_path: "url"
    params:
      limit:
        type: integer
        default: 20
        description: "Number of tweets to return"

  trending:
    description: "Twitter/X trending topics"
    url: "https://x.com/explore/tabs/trending"
    format: browser_api
    evaluate: |
      (() => {
        const items = [];
        const cells = document.querySelectorAll('[data-testid="trend"]');
        cells.forEach((cell) => {
          const text = cell.textContent || '';
          if (text.includes('Promoted')) return;
          const container = cell.querySelector(':scope > div');
          if (!container) return;
          const divs = container.children;
          if (divs.length < 2) return;
          const topic = divs[1].textContent.trim();
          if (!topic) return;
          const catText = divs[0].textContent.trim();
          const category = catText.replace(/^\d+\s*/, '').replace(/^\xB7\s*/, '').trim();
          let tweets = 'N/A';
          for (let j = 2; j < divs.length; j++) {
            if (divs[j].matches('[data-testid="caret"]') || divs[j].querySelector('[data-testid="caret"]')) continue;
            const t = divs[j].textContent.trim();
            if (t && /\d/.test(t)) { tweets = t; break; }
          }
          items.push({ rank: items.length + 1, topic, tweets, category });
        });
        return JSON.stringify(items.slice(0, 20));
      })()
    fields:
      rank:
        json_path: "rank"
      topic:
        json_path: "topic"
      tweets:
        json_path: "tweets"
      category:
        json_path: "category"
    params:
      limit:
        type: integer
        default: 20
        description: "Number of trends to show"

  search:
    description: "Search Twitter/X for tweets"
    url: "https://x.com/search?q={query}&f=top"
    format: browser_api
    evaluate: |
      (async () => {
        const ct0 = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('ct0='))?.split('=')[1];
        if (!ct0) return JSON.stringify([{error: 'Not logged in'}]);

        const bearer = 'AAAAAAAAAAAAAAAAAAAAANRILgAAAAAAnNwIzUejRCOuH5E6I8xnZz4puTs%3D1Zv7ttfk8LF81IUq16cHjhLTvJu4FA33AGWWjCpTnA';
        const headers = {
          'Authorization': 'Bearer ' + decodeURIComponent(bearer),
          'X-Csrf-Token': ct0,
          'X-Twitter-Auth-Type': 'OAuth2Session',
          'X-Twitter-Active-User': 'yes'
        };

        const query = new URLSearchParams(window.location.search).get('q') || '';
        const variables = JSON.stringify({
          rawQuery: query,
          count: 20,
          querySource: 'typed_query',
          product: 'Top'
        });
        const features = JSON.stringify({
          rweb_video_screen_enabled: false,
          profile_label_improvements_pcf_label_in_post_enabled: true,
          rweb_tipjar_consumption_enabled: true,
          verified_phone_label_enabled: false,
          creator_subscriptions_tweet_preview_api_enabled: true,
          responsive_web_graphql_timeline_navigation_enabled: true,
          responsive_web_graphql_skip_user_profile_image_extensions_enabled: false,
          premium_content_api_read_enabled: false,
          communities_web_enable_tweet_community_results_fetch: true,
          c9s_tweet_anatomy_moderator_badge_enabled: true,
          articles_preview_enabled: true,
          responsive_web_edit_tweet_api_enabled: true,
          graphql_is_translatable_rweb_tweet_is_translatable_enabled: true,
          view_counts_everywhere_api_enabled: true,
          longform_notetweets_consumption_enabled: true,
          responsive_web_twitter_article_tweet_consumption_enabled: true,
          tweet_awards_web_tipping_enabled: false,
          freedom_of_speech_not_reach_fetch_enabled: true,
          standardized_nudges_misinfo: true,
          tweet_with_visibility_results_prefer_gql_limited_actions_policy_enabled: true,
          longform_notetweets_rich_text_read_enabled: true,
          longform_notetweets_inline_media_enabled: true,
          responsive_web_enhance_cards_enabled: false
        });

        const queryId = 'MJpyQGqgklrVl_0X9gNy3A';
        const url = '/i/api/graphql/' + queryId + '/SearchTimeline'
          + '?variables=' + encodeURIComponent(variables)
          + '&features=' + encodeURIComponent(features);

        const resp = await fetch(url, { headers, credentials: 'include' });
        if (!resp.ok) return JSON.stringify([{error: 'HTTP ' + resp.status}]);
        const data = await resp.json();

        const results = [];
        const seen = new Set();
        const insts = data?.data?.search_by_raw_query?.search_timeline?.timeline?.instructions || [];
        const addEntries = insts.find(i => i.type === 'TimelineAddEntries') || insts.find(i => i.entries && Array.isArray(i.entries));
        if (!addEntries?.entries) return JSON.stringify([]);

        for (const entry of addEntries.entries) {
          if (!entry.entryId.startsWith('tweet-')) continue;
          let tweet = entry.content?.itemContent?.tweet_results?.result;
          if (!tweet) continue;
          if (tweet.__typename === 'TweetWithVisibilityResults' && tweet.tweet) {
            tweet = tweet.tweet;
          }
          if (!tweet.rest_id || seen.has(tweet.rest_id)) continue;
          seen.add(tweet.rest_id);
          const tweetUser = tweet.core?.user_results?.result;
          results.push({
            id: tweet.rest_id,
            author: tweetUser?.core?.screen_name || tweetUser?.legacy?.screen_name || 'unknown',
            text: tweet.note_tweet?.note_tweet_results?.result?.text || tweet.legacy?.full_text || '',
            created_at: tweet.legacy?.created_at || '',
            likes: tweet.legacy?.favorite_count || 0,
            views: tweet.views?.count || '0',
            url: 'https://x.com/i/status/' + tweet.rest_id
          });
        }
        return JSON.stringify(results.slice(0, 15));
      })()
    fields:
      id:
        json_path: "id"
      author:
        json_path: "author"
      text:
        json_path: "text"
      created_at:
        json_path: "created_at"
      likes:
        json_path: "likes"
      views:
        json_path: "views"
      url:
        json_path: "url"
    params:
      query:
        type: string
        required: true
        description: "Search query"
      limit:
        type: integer
        default: 15
        description: "Number of results to return"

  profile:
    description: "Fetch a Twitter user profile (bio, stats, etc.)"
    url: "https://x.com/{username}"
    format: browser_api
    evaluate: |
      (async () => {
        const screenName = window.location.pathname.replace(/^\//, '').split('/')[0];
        const ct0 = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('ct0='))?.split('=')[1];
        if (!ct0) return JSON.stringify([{error: 'Not logged in'}]);

        const bearer = 'AAAAAAAAAAAAAAAAAAAAANRILgAAAAAAnNwIzUejRCOuH5E6I8xnZz4puTs%3D1Zv7ttfk8LF81IUq16cHjhLTvJu4FA33AGWWjCpTnA';
        const headers = {
          'Authorization': 'Bearer ' + decodeURIComponent(bearer),
          'X-Csrf-Token': ct0,
          'X-Twitter-Auth-Type': 'OAuth2Session',
          'X-Twitter-Active-User': 'yes'
        };

        const variables = JSON.stringify({
          screen_name: screenName,
          withSafetyModeUserFields: true
        });
        const features = JSON.stringify({
          hidden_profile_subscriptions_enabled: true,
          rweb_tipjar_consumption_enabled: true,
          responsive_web_graphql_exclude_directive_enabled: true,
          verified_phone_label_enabled: false,
          subscriptions_verification_info_is_identity_verified_enabled: true,
          subscriptions_verification_info_verified_since_enabled: true,
          highlights_tweets_tab_ui_enabled: true,
          responsive_web_twitter_article_notes_tab_enabled: true,
          subscriptions_feature_can_gift_premium: true,
          creator_subscriptions_tweet_preview_api_enabled: true,
          responsive_web_graphql_skip_user_profile_image_extensions_enabled: false,
          responsive_web_graphql_timeline_navigation_enabled: true
        });

        const queryId = 'qRednkZG-rn1P6b48NINmQ';
        const url = '/i/api/graphql/' + queryId + '/UserByScreenName?variables='
          + encodeURIComponent(variables)
          + '&features=' + encodeURIComponent(features);

        const resp = await fetch(url, { headers, credentials: 'include' });
        if (!resp.ok) return JSON.stringify([{error: 'HTTP ' + resp.status}]);
        const d = await resp.json();

        const result = d.data?.user?.result;
        if (!result) return JSON.stringify([{error: 'User not found'}]);

        const legacy = result.legacy || {};
        const expandedUrl = legacy.entities?.url?.urls?.[0]?.expanded_url || '';

        return JSON.stringify([{
          screen_name: legacy.screen_name || screenName,
          name: legacy.name || '',
          bio: legacy.description || '',
          location: legacy.location || '',
          url: expandedUrl,
          followers: legacy.followers_count || 0,
          following: legacy.friends_count || 0,
          tweets: legacy.statuses_count || 0,
          likes: legacy.favourites_count || 0,
          verified: result.is_blue_verified || legacy.verified || false,
          created_at: legacy.created_at || ''
        }]);
      })()
    fields:
      screen_name:
        json_path: "screen_name"
      name:
        json_path: "name"
      bio:
        json_path: "bio"
      location:
        json_path: "location"
      url:
        json_path: "url"
      followers:
        json_path: "followers"
      following:
        json_path: "following"
      tweets:
        json_path: "tweets"
      likes:
        json_path: "likes"
      verified:
        json_path: "verified"
      created_at:
        json_path: "created_at"
    params:
      username:
        type: string
        required: true
        description: "Twitter screen name (without @)"
