name: xiaohongshu
description: "小红书 — 搜索笔记和用户内容（需要登录）"
base_url: "https://www.xiaohongshu.com"
version: "1.0.0"

commands:
  search:
    description: "搜索小红书笔记"
    url: "https://www.xiaohongshu.com/search_result?keyword={query}&type=1"
    format: browser
    selector: 'class="note-item".*?</section>'
    fields:
      title:
        pattern: 'class="title[^"]*">([^<]+)<'
        default: ""
      author:
        pattern: 'class="name[^"]*">([^<]+)<'
        default: ""
      likes:
        pattern: 'class="count">([^<]+)<'
        default: ""
      url:
        pattern: 'href="(/explore/[^"]+)"'
        default: ""
    params:
      query:
        type: string
        required: true
        description: "Search keyword"
      limit:
        type: integer
        default: 20
        description: "Number of results to return"

  feed:
    description: "小红书首页推荐 Feed"
    url: "https://www.xiaohongshu.com/explore"
    format: browser
    selector: 'class="note-item".*?</section>'
    fields:
      title:
        pattern: 'class="title[^"]*">([^<]+)<'
        default: ""
      author:
        pattern: 'class="name[^"]*">([^<]+)<'
        default: ""
      likes:
        pattern: 'class="count">([^<]+)<'
        default: ""
    params:
      limit:
        type: integer
        default: 20
        description: "Number of items to return"
