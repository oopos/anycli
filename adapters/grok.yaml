name: grok
description: "Grok - xAI chat assistant"
base_url: "https://grok.com"
version: "1.0.0"

commands:
  ask:
    description: "Send a prompt and get response"
    url: "https://grok.com/"
    format: browser_api
    evaluate: |
      (async () => {
        const prompt = '${{text}}';
        const timeout = parseInt('${{timeout}}') || 120;

        const isVisible = (el) => {
          if (!(el instanceof HTMLElement)) return false;
          const style = window.getComputedStyle(el);
          if (style.display === 'none' || style.visibility === 'hidden') return false;
          const rect = el.getBoundingClientRect();
          return rect.width > 0 && rect.height > 0;
        };

        // Get baseline bubble count
        const getBubbleTexts = () => {
          return Array.from(document.querySelectorAll('div.message-bubble, [data-testid="message-bubble"]'))
            .map(node => (node.innerText || '').trim())
            .filter(Boolean);
        };

        const baselineBubbles = getBubbleTexts();

        // Try ProseMirror editor first, then textarea
        let sent = false;
        const prosemirror = document.querySelector('.ProseMirror[contenteditable="true"]');
        if (prosemirror && prosemirror.editor?.commands?.focus && prosemirror.editor?.commands?.insertContent) {
          const editor = prosemirror.editor;
          if (editor.commands.clearContent) editor.commands.clearContent();
          editor.commands.focus();
          editor.commands.insertContent(prompt);
          await new Promise(r => setTimeout(r, 1000));

          // Find submit button
          const submitBtn = Array.from(document.querySelectorAll('button[aria-label="Submit"]'))
            .find(b => isVisible(b) && !b.disabled);
          if (submitBtn) { submitBtn.click(); sent = true; }
        }

        if (!sent) {
          const box = document.querySelector('textarea');
          if (!box) return JSON.stringify({response: '[ERROR] No input found'});
          box.focus();
          box.value = '';
          document.execCommand('selectAll');
          document.execCommand('insertText', false, prompt);
          await new Promise(r => setTimeout(r, 1500));

          const btn = document.querySelector('button[aria-label="\u63d0\u4ea4"]');
          if (btn && !btn.disabled) { btn.click(); sent = true; }
          if (!sent) {
            const sub = [...document.querySelectorAll('button[type="submit"]')].find(b => !b.disabled);
            if (sub) { sub.click(); sent = true; }
          }
          if (!sent) {
            box.dispatchEvent(new KeyboardEvent('keydown', {key: 'Enter', code: 'Enter', keyCode: 13, bubbles: true}));
            sent = true;
          }
        }

        if (!sent) return JSON.stringify({response: '[SEND FAILED]'});

        // Wait for response
        const startTime = Date.now();
        let lastText = '';
        let stableCount = 0;
        while (Date.now() - startTime < timeout * 1000) {
          await new Promise(r => setTimeout(r, 3000));
          const bubbles = getBubbleTexts();
          // Pick latest bubble that isn't our prompt
          const freshBubbles = bubbles.slice(Math.max(0, baselineBubbles.length)).filter(Boolean);
          let candidate = '';
          for (let i = freshBubbles.length - 1; i >= 0; i--) {
            if (freshBubbles[i] !== prompt.trim()) { candidate = freshBubbles[i]; break; }
          }
          if (candidate && candidate.length > 2) {
            if (candidate === lastText) {
              stableCount++;
              if (stableCount >= 2) return JSON.stringify({response: candidate});
            } else {
              lastText = candidate;
              stableCount = 0;
            }
          }
        }
        if (lastText) return JSON.stringify({response: lastText});
        return JSON.stringify({response: '[NO RESPONSE] No response within ' + timeout + 's'});
      })()
    fields:
      response:
        json_path: "response"
    params:
      text:
        type: string
        required: true
        description: "Prompt to send to Grok"
      timeout:
        type: string
        required: false
        description: "Max seconds to wait (default: 120)"
        default: "120"

  new:
    description: "Start a new conversation"
    url: "https://grok.com/"
    format: browser_api
    evaluate: |
      (() => {
        const isVisible = (el) => {
          if (!(el instanceof HTMLElement)) return false;
          const rect = el.getBoundingClientRect();
          const style = window.getComputedStyle(el);
          return rect.width > 0 && rect.height > 0 && style.visibility !== 'hidden' && style.display !== 'none';
        };

        const candidates = Array.from(document.querySelectorAll('a, button')).filter(node => {
          if (!isVisible(node)) return false;
          const text = (node.textContent || '').trim().toLowerCase();
          const aria = (node.getAttribute('aria-label') || '').trim().toLowerCase();
          const href = node.getAttribute('href') || '';
          return text.includes('new chat') || text.includes('new conversation')
            || aria.includes('new chat') || aria.includes('new conversation')
            || href === '/';
        });

        if (candidates[0]) {
          candidates[0].click();
          return JSON.stringify({status: 'new conversation started'});
        }
        window.location.href = 'https://grok.com/';
        return JSON.stringify({status: 'navigated to new chat'});
      })()
    fields:
      status:
        json_path: "status"
    params: {}

  read:
    description: "Read current conversation"
    url: "https://grok.com/"
    format: browser_api
    evaluate: |
      (() => {
        const bubbles = document.querySelectorAll('div.message-bubble, [data-testid="message-bubble"]');
        if (bubbles.length === 0) return JSON.stringify({messages: 'No messages found'});
        const texts = Array.from(bubbles).map(b => (b.innerText || '').trim()).filter(Boolean);
        return JSON.stringify({messages: texts.join('\n\n---\n\n')});
      })()
    fields:
      messages:
        json_path: "messages"
    params: {}
