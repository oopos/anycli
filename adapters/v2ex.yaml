name: v2ex
description: "V2EX — 创意工作者社区，热门话题和最新讨论"
base_url: "https://www.v2ex.com/api"
version: "1.0.0"

commands:
  hot:
    description: "Hot topics"
    url: "/topics/hot.json"
    format: json
    fields:
      title:
        json_path: "title"
      node:
        json_path: "node.title"
      author:
        json_path: "member.username"
      replies:
        json_path: "replies"
      url:
        json_path: "url"
    params:
      limit:
        type: integer
        default: 20
        description: "Number of topics to return"

  latest:
    description: "Latest topics"
    url: "/topics/latest.json"
    format: json
    fields:
      title:
        json_path: "title"
      node:
        json_path: "node.title"
      author:
        json_path: "member.username"
      replies:
        json_path: "replies"
      url:
        json_path: "url"
    params:
      limit:
        type: integer
        default: 20
        description: "Number of topics to return"

  node:
    description: "Get topics in a specific node"
    url: "/topics/show.json?node_name={name}"
    format: json
    fields:
      title:
        json_path: "title"
      author:
        json_path: "member.username"
      replies:
        json_path: "replies"
      url:
        json_path: "url"
    params:
      name:
        type: string
        required: true
        description: "Node name (e.g. python, golang, apple, jobs)"

  member:
    description: "V2EX 用户资料"
    url: "/members/show.json?username={username}"
    format: json
    fields:
      username:
        json_path: "username"
      bio:
        json_path: "bio"
        default: ""
      website:
        json_path: "website"
        default: ""
      created:
        json_path: "created"
    params:
      username:
        type: string
        required: true
        description: "Username"

  replies:
    description: "V2EX 主题回复列表"
    url: "/replies/show.json?topic_id={id}"
    format: json
    fields:
      content:
        json_path: "content"
      author:
        json_path: "member.username"
      created:
        json_path: "created"
    params:
      id:
        type: string
        required: true
        description: "Topic ID"
      limit:
        type: integer
        default: 20
        description: "Number of replies to return"
